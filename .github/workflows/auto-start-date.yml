name: Set Issue Start Date in Project

on:
  issues: 
    types: [opened, reopened]

jobs:
  set-start-date:
    runs-on: ubuntu-latest
    permissions: 
      contents: read
      issues: read
      repository-projects: write

    steps:
      - name: Set "Start date" field to today
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const TARGET_PROJECT_ID = "PVT_kwHOAdekKs4Ay228";
            const START_DATE_FIELD_ID = "PVTF_lAHOAdekKs4Ay228zg-Po2I";

            const today = new Date().toISOString().split('T')[0];
            const issueNodeId = context.payload.issue.node_id;

            console.log("Issue Node ID:", issueNodeId);
            console.log("Today's date:", today);

            // GraphQL query to fetch project items for this issue
            const query = `
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 20) {
                      nodes {
                        id
                        project { id }
                      }
                    }
                  }
                }
              }
            `;

            let projectItem;
            const maxRetries = 12;
            const delayMs = 5000;

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              const result = await github.graphql(query, { issueId: issueNodeId });
              projectItem = result.node.projectItems.nodes.find(
                item => item.project.id === TARGET_PROJECT_ID
              );

              if (projectItem) break;

              if (attempt < maxRetries) {
                console.log(`Attempt ${attempt}: Project item not yet created. Retrying in ${delayMs/1000}s...`);
                await new Promise(r => setTimeout(r, delayMs));
              }
            }

            if (!projectItem) {
              console.log("Project item never appeared after retries. Exiting workflow.");
              return;
            }

            console.log("Project Item ID:", projectItem.id);

            // GraphQL mutation to set the Start date
            const mutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $date: Date!) {
                updateProjectV2ItemFieldValue(
                  input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { date: $date }
                  }
                ) {
                  projectV2Item { id }
                }
              }
            `;

            await github.graphql(mutation, {
              projectId: TARGET_PROJECT_ID,
              itemId: projectItem.id,
              fieldId: START_DATE_FIELD_ID,
              date: today
            });

            console.log('"Start date" successfully set.');
