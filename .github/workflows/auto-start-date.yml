name: Set Issue Start Date in Project

on:
  issues: 
    types: [opened, reopened]

jobs:
  set-start-date:
    runs-on: ubuntu-latest
    permissions: 
      contents: read
      issues: read
      repository-projects: write

    steps:
      - name: Set "Start date" field to today
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const TARGET_PROJECT_ID = "PVT_kwHOAdekKs4Ay228";
            const START_DATE_FIELD_ID = "PVTF_lAHOAdekKs4Ay228zg-Po2I";

            const issueNodeId = context.payload.issue.node_id;
            const today = new Date().toISOString().split('T')[0];

            console.log("Issue Node ID:", issueNodeId);
            console.log("Today's date:", today);

            // 1️⃣ Query all project items in the project
            const query = `
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            id
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              projectId: TARGET_PROJECT_ID
            });

            const projectItem = result.node.items.nodes.find(
              item => item.content && item.content.id === issueNodeId
            );

            if (!projectItem) {
              console.log("Project item not found in project. Exiting.");
              return;
            }

            console.log("Project Item ID:", projectItem.id);

            // 2️⃣ Update the Start date field
            const mutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $date: Date!) {
                updateProjectV2ItemFieldValue(
                  input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { date: $date }
                  }
                ) {
                  projectV2Item { id }
                }
              }
            `;

            await github.graphql(mutation, {
              projectId: TARGET_PROJECT_ID,
              itemId: projectItem.id,
              fieldId: START_DATE_FIELD_ID,
              date: today
            });

            console.log('"Start date" successfully set.');
